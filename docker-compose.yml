version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: triage_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: triage_user
      POSTGRES_PASSWORD: triage_pass
      POSTGRES_DB: triage_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage_user -d triage_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: triage_backend
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy
    
    environment:
      DATABASE_URL: postgresql+asyncpg://triage_user:triage_pass@db:5432/triage_db
      GROQ_API_KEY: ${GROQ_API_KEY}
      jwt_secret_key: ${SECRET_KEY}

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/backend
    
    command: >
      sh -c "alembic upgrade head &&
              uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    
    container_name: triage_frontend
    restart: unless-stopped

    depends_on:
      - backend

    environment:
      VITE_API_BASE_URL: http://localhost:8000
    
    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules

volumes:
  postgres_data:
